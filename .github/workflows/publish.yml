name: Publish Package

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '!.github/**'
      - '!README.md'
      - '!LICENSE'
      - '!.gitignore'

  workflow_dispatch:
    inputs:
      release_level:
        description: 'Release level (patch, minor, major)'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: publish-package
  cancel-in-progress: false

jobs:
  publish:
    uses: aux4/aux4/.github/workflows/publish-package.yml@main
    with:
      package_name: secret-1password
      package_scope: aux4
      release_level: ${{ github.event_name == 'workflow_dispatch' && inputs.release_level || 'patch' }}
      skip_build: true
    secrets:
      AUX4_ACCESS_TOKEN: ${{ secrets.AUX4_ACCESS_TOKEN }}
